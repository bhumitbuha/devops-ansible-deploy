---
- name: Verify Docker daemon is running
  ansible.builtin.command: docker info
  register: docker_setup_info
  changed_when: false
  failed_when: docker_setup_info.rc != 0

- name: Display Docker version
  ansible.builtin.command: docker --version
  register: docker_setup_version
  changed_when: false

- name: Show Docker version
  ansible.builtin.debug:
    msg: "Docker version: {{ docker_setup_version.stdout }}"

- name: Ensure Docker network exists
  community.docker.docker_network:
    name: "{{ docker_network }}"
    state: present
  failed_when: false

- name: Prune dangling Docker images (cleanup)
  ansible.builtin.command: docker image prune -f
  register: docker_setup_prune_result
  changed_when: "'Total reclaimed space: 0B' not in docker_setup_prune_result.stdout"
  failed_when: false

- name: Docker setup complete
  ansible.builtin.debug:
    msg: "Docker environment verified and ready"
