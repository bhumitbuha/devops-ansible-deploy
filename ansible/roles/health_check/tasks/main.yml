---
- name: Health check waiting for app to be ready
  ansible.builtin.uri:
    url: "{{ health_check_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: health_check_response
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"
  until: health_check_response.status == 200

- name: Display health check response
  ansible.builtin.debug:
    msg: "Health check PASSED — Response: {{ health_check_response.json }}"

- name: Validate version in health response
  ansible.builtin.assert:
    that:
      - health_check_response.json.status == "ok"
      - health_check_response.json.version == app_version
    fail_msg: "Health check FAILED — version mismatch or status not ok"
    success_msg: "Version {{ app_version }} confirmed healthy in {{ target_env }}"

- name: Fetch metrics endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}/metrics"
    method: GET
    status_code: 200
    return_content: true
  register: health_check_metrics_response
  failed_when: false

- name: Display metrics
  ansible.builtin.debug:
    msg: "Metrics: {{ health_check_metrics_response.json }}"
  when: health_check_metrics_response is defined and health_check_metrics_response.status == 200

- name: Record deployment success
  ansible.builtin.copy:
    dest: "{{ project_root }}/artifacts/deploy-record-{{ target_env }}.txt"
    mode: "0644"
    content: |
      DEPLOYMENT RECORD
      =================
      Timestamp: {{ ansible_date_time.iso8601 }}
      Environment: {{ target_env }}
      Version: {{ app_version }}
      Health: PASSING
      Container: {{ app_name }}-{{ target_env }}
