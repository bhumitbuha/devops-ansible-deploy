---
- name: Build Docker image
  community.docker.docker_image:
    build:
      path: "{{ app_dir }}"
      dockerfile: Dockerfile
    name: "{{ docker_image_name }}"
    tag: "{{ app_version }}"
    source: build
    force_source: true
  register: app_deploy_image_build_result

- name: Display image build result
  ansible.builtin.debug:
    msg: "Image built: {{ docker_image_name }}:{{ app_version }}"

- name: Stop and remove existing container (idempotent)
  community.docker.docker_container:
    name: "{{ app_name }}-{{ target_env }}"
    state: absent
    force_kill: true
  failed_when: false

- name: Deploy container
  community.docker.docker_container:
    name: "{{ app_name }}-{{ target_env }}"
    image: "{{ docker_image_name }}:{{ app_version }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ app_port }}:5000"
    env:
      APP_VERSION: "{{ app_version }}"
      APP_ENV: "{{ target_env }}"
      PORT: "5000"
    networks:
      - name: "{{ docker_network }}"
    volumes:
      - app-logs:/var/log/app
  register: app_deploy_container_result

- name: Wait for container to initialize
  ansible.builtin.pause:
    seconds: 5

- name: Display container state
  ansible.builtin.debug:
    msg: "Container {{ app_deploy_container_result.container.Name }} is {{ app_deploy_container_result.container.State.Status }}"
